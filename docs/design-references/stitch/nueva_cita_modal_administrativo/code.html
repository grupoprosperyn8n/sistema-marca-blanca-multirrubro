<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

<title>Nueva Cita - Aura Management</title>

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 93, 144, 0.08);
        }
        .glass-input {
            background: rgba(242, 244, 246, 0.5);
            border: 1px solid rgba(191, 199, 209, 0.4);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 93, 144, 0.5);
            box-shadow: 0 0 0 2px rgba(0, 93, 144, 0.1), inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }
        
        /* Simulated Background for Context */
        body {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(205, 229, 255, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(167, 237, 255, 0.2) 0px, transparent 50%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Fake Dashboard Content behind Modal */
        .fake-dashboard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 24px;
            z-index: 0;
            filter: blur(8px);
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body class="text-on-surface font-body-md antialiased">
<!-- Fake Background Content -->
<div class="fake-dashboard">
<div class="bg-surface-container-low rounded-xl h-full border border-outline-variant/20"></div>
<div class="flex flex-col gap-6">
<div class="h-16 bg-surface-container-low rounded-xl border border-outline-variant/20 w-full"></div>
<div class="grid grid-cols-3 gap-6">
<div class="h-32 bg-surface-container-low rounded-xl border border-outline-variant/20"></div>
<div class="h-32 bg-surface-container-low rounded-xl border border-outline-variant/20"></div>
<div class="h-32 bg-surface-container-low rounded-xl border border-outline-variant/20"></div>
</div>
<div class="h-96 bg-surface-container-low rounded-xl border border-outline-variant/20 w-full"></div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 bg-on-surface/10 backdrop-blur-sm z-50 flex items-center justify-center p-4 sm:p-6 lg:p-8">
<!-- Modal Container -->
<div class="glass-panel w-full max-w-4xl rounded-2xl overflow-hidden flex flex-col shadow-2xl shadow-primary/20 transform transition-all">
<!-- Modal Header -->
<div class="flex justify-between items-center p-6 border-b border-outline-variant/30 bg-surface-lowest/50">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Nueva Cita</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Programa un nuevo servicio para un cliente.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface hover:bg-surface-variant/50 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (2 Columns) -->
<div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 bg-surface-container-lowest">
<!-- Left Column: Client & Service -->
<div class="flex flex-col gap-6">
<!-- Client Search -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="person">person</span>
                            Cliente
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="glass-input w-full pl-10 pr-4 py-2.5 rounded-lg text-on-surface placeholder:text-outline focus:outline-none font-body-md text-body-md transition-all" placeholder="Buscar por nombre, teléfono o email..." type="text"/>
</div>
<!-- Dynamic Suggestion (Example) -->
<div class="mt-2 bg-surface-container-low rounded-lg border border-outline-variant/30 p-2 cursor-pointer hover:bg-surface-variant/50 transition-colors flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-md text-label-md shrink-0">
                                EC
                            </div>
<div class="flex-1 min-w-0">
<p class="font-body-md text-body-md font-medium text-on-surface truncate">Elena Castro</p>
<p class="font-body-sm text-body-sm text-on-surface-variant truncate">+34 600 123 456</p>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check_circle">check_circle</span>
</div>
</div>
<!-- Service Selection -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="spa">spa</span>
                            Servicio
                        </label>
<div class="grid grid-cols-1 gap-3">
<!-- Service Option 1 (Selected) -->
<label class="relative flex items-start p-4 rounded-xl border-2 border-primary bg-primary-fixed/10 cursor-pointer">
<input checked="" class="sr-only" name="service" type="radio"/>
<div class="flex-1">
<p class="font-body-md text-body-md font-medium text-on-surface">Masaje Relajante</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">60 min • Relajación profunda</p>
</div>
<span class="font-label-md text-label-md text-primary font-bold">65€</span>
</label>
<!-- Service Option 2 -->
<label class="relative flex items-start p-4 rounded-xl border border-outline-variant/40 bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer">
<input class="sr-only" name="service" type="radio"/>
<div class="flex-1">
<p class="font-body-md text-body-md font-medium text-on-surface">Tratamiento Facial Aura</p>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">45 min • Limpieza e hidratación</p>
</div>
<span class="font-label-md text-label-md text-on-surface font-bold">50€</span>
</label>
</div>
</div>
</div>
<!-- Right Column: Date, Time & Professional -->
<div class="flex flex-col gap-6">
<!-- Date Picker (Simplified UI) -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="calendar_month">calendar_month</span>
                            Fecha
                        </label>
<input class="glass-input w-full px-4 py-2.5 rounded-lg text-on-surface focus:outline-none font-body-md text-body-md transition-all" type="date"/>
</div>
<!-- Professional Selection -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="badge">badge</span>
                            Profesional
                        </label>
<select class="glass-input w-full px-4 py-2.5 rounded-lg text-on-surface focus:outline-none font-body-md text-body-md transition-all appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23707881%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-no-repeat bg-[position:right_1rem_center] bg-[length:1.2em_1.2em]">
<option value="">Cualquier profesional disponible</option>
<option value="1">Marta López</option>
<option value="2">Carlos Ruiz</option>
</select>
</div>
<!-- Time Slots -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]" data-icon="schedule">schedule</span>
                            Horas Disponibles
                        </label>
<div class="grid grid-cols-3 gap-2">
<button class="py-2 px-3 rounded-lg border border-outline-variant/40 bg-surface-container-lowest hover:bg-surface-container-low font-label-md text-label-md text-on-surface transition-colors">10:00</button>
<button class="py-2 px-3 rounded-lg border border-outline-variant/40 bg-surface-container-lowest hover:bg-surface-container-low font-label-md text-label-md text-on-surface transition-colors">11:30</button>
<button class="py-2 px-3 rounded-lg border-2 border-primary bg-primary-fixed/20 font-label-md text-label-md text-primary font-bold transition-colors">15:00</button>
<button class="py-2 px-3 rounded-lg border border-outline-variant/40 bg-surface-container-lowest hover:bg-surface-container-low font-label-md text-label-md text-on-surface transition-colors">16:30</button>
<button class="py-2 px-3 rounded-lg border border-outline-variant/40 bg-surface-container-lowest opacity-50 cursor-not-allowed font-label-md text-label-md text-on-surface-variant transition-colors" disabled="">18:00</button>
</div>
</div>
</div>
</div>
<!-- Modal Footer (Summary & Action) -->
<div class="p-6 border-t border-outline-variant/30 bg-surface-container-low/80 flex flex-col sm:flex-row justify-between items-center gap-4">
<!-- Summary -->
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-surface-variant">Total Estimado</p>
<p class="font-headline-md text-headline-md text-primary font-bold">65.00 €</p>
</div>
</div>
<!-- Actions -->
<div class="flex gap-3 w-full sm:w-auto">
<button class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low text-on-surface font-label-md text-label-md transition-colors">
                        Cancelar
                    </button>
<button class="flex-1 sm:flex-none px-6 py-2.5 rounded-lg bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md shadow-md shadow-primary/20 transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="check">check</span>
                        Confirmar Reserva
                    </button>
</div>
</div>
</div>
</div>
</body></html>
